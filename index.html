<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Data Center Dashboard</title>
    <!-- Include Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; overflow: hidden; background: #111; }
        .main-container { display: flex; height: 100vh; width: 100vw; }
        #viewDiv { flex: 1; height: 100%; }

        #sidebar {
            width: 380px; background: #191919; border-left: 1px solid #444;
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto; color: #ddd; font-family: sans-serif;
        }

        .chart-card {
            background: #222; padding: 15px; border-radius: 8px; border: 1px solid #333;
        }

        canvas { width: 100% !important; height: auto !important; }

        #powerContainer {
            position: absolute; top: 10px; left: 40%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 10px;
            background: rgba(25, 25, 25, 0.9); padding: 10px 15px; border-radius: 30px;
            border: 1px solid #444;
        }

        button {
            padding: 8px 12px; cursor: pointer; border: 1px solid #444;
            border-radius: 20px; background: #333; color: #ddd; font-size: 12px;
        }
        button:hover { background: #444; }
        .active { background: #0078d4; color: #fff; }
        .loc-btn { width: 100%; border-radius: 4px; text-align: left; margin-bottom: 5px;}
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
</head>
<body>

    <div class="main-container">
        <div id="viewDiv">
            <div id="powerContainer">
                <button id="daily" class="active">Daily</button>
                <button id="weekly">Weekly</button>
                <button id="monthly">Monthly</button>
                <button id="yearly">Yearly</button>
            </div>
        </div>

        <div id="sidebar">
            <h3 style="color: #0078d4; margin-top: 0;">Infrastructure & Rates</h3>
            
            <div id="locationContainer">
                <button class="loc-btn" onclick="zoomToCenter('novva')">Novva COS</button>
                <button class="loc-btn" onclick="zoomToCenter('qts')">QTS COS</button>
                <button class="loc-btn" onclick="zoomToCenter('t5')">T5@Colorado</button>
            </div>

            <hr style="border: 0; border-top: 1px solid #333;">

            <!-- Price Trend Chart -->
            <div class="chart-card">
                <div style="font-size: 13px; font-weight: bold; margin-bottom: 10px;">Avg Electricity Price (¢/kWh)</div>
                <canvas id="priceChart"></canvas>
            </div>

            <!-- Revenue vs Sales Chart -->
            <div class="chart-card">
                <div style="font-size: 13px; font-weight: bold; margin-bottom: 10px;">Total Revenue vs. Consumption</div>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Embedded Data from your Elec_Rates.xlsx
        const rawData = [{"Year": 1990, "Price": 7.02, "Rev": 687083, "Sales": 9787280}, {"Year": 1995, "Price": 7.42, "Rev": 838964, "Sales": 11306705}, {"Year": 2000, "Price": 7.31, "Rev": 1024815, "Sales": 14028934}, {"Year": 2005, "Price": 9.06, "Rev": 1489539, "Sales": 16436381}, {"Year": 2010, "Price": 11.04, "Rev": 1997858, "Sales": 18102386}, {"Year": 2014, "Price": 12.18, "Rev": 2203838, "Sales": 18092932}, {"Year": 2020, "Price": 12.36, "Rev": 2531337, "Sales": 20482502}, {"Year": 2024, "Price": 14.92, "Rev": 3086849, "Sales": 20693690}];
        
        // Sorting data for proper line flow
        const sortedData = rawData.sort((a, b) => a.Year - b.Year);
        const years = sortedData.map(d => d.Year);

        // Render Price Chart
        new Chart(document.getElementById('priceChart'), {
            type: 'line',
            data: {
                labels: years,
                datasets: [{
                    label: 'Cents/kWh',
                    data: sortedData.map(d => d.Price),
                    borderColor: '#0078d4',
                    backgroundColor: 'rgba(0, 120, 212, 0.2)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                    x: { grid: { display: false }, ticks: { color: '#aaa' } }
                }
            }
        });

        // Render Revenue vs Sales Chart
        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: years,
                datasets: [{
                    label: 'Revenue ($M)',
                    type: 'bar',
                    data: sortedData.map(d => d.Rev / 1000),
                    backgroundColor: '#dc143c'
                }, {
                    label: 'Sales (GWh)',
                    type: 'line',
                    data: sortedData.map(d => d.Sales / 1000),
                    borderColor: '#fff',
                    borderWidth: 2,
                    yAxisID: 'y1'
                }]
            },
            options: {
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                    y1: { position: 'right', grid: { display: false }, ticks: { color: '#aaa' } },
                    x: { ticks: { color: '#aaa' } }
                }
            }
        });

        // ArcGIS Integration Logic
        let view; 
        require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], function(Map, SceneView, GeoJSONLayer) {
            const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";
            
            function createRenderer(columnName) {
                return {
                    type: "unique-value", field: "Category",
                    defaultSymbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [0, 120, 212, 0.6] } }] },
                    uniqueValueInfos: [{ value: "Data Center", symbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [255, 0, 0, 0.9] } }] } }],
                    visualVariables: [{ type: "size", field: columnName, valueUnit: "meters" }]
                };
            }

            const layer = new GeoJSONLayer({ url: url, renderer: createRenderer("Daily_MWh") });
            const map = new Map({ basemap: "dark-gray-vector", layers: [layer] });
            view = new SceneView({ container: "viewDiv", map: map, camera: { position: [-104.81435, 38.9000, 8000], tilt: 45 } });

            const locs = { novva: [-104.81435, 39.01406], qts: [-104.8477, 38.91806], t5: [-104.8025, 38.7962] };
            window.zoomToCenter = (k) => view.goTo({ target: locs[k], zoom: 16, tilt: 70 });

            const fieldMap = { daily: "Daily_MWh", weekly: "Weekly_MWh", monthly: "Monthly_MWh", yearly: "Yearly_MWh" };
            Object.keys(fieldMap).forEach(id => {
                document.getElementById(id).onclick = (e) => {
                    document.querySelectorAll("#powerContainer button").forEach(b => b.classList.remove("active"));
                    e.target.classList.add("active");
                    layer.renderer = createRenderer(fieldMap[id]);
                };
            });
        });
    </script>
</body>
</html>
