<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Springs Data Center Infrastructure</title>
    <!-- Chart.js + Annotation Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <!-- ArcGIS Maps SDK -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    
    <style>
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .main-container { display: flex; height: 100vh; width: 100vw; }
        #viewDiv { flex: 1; height: 100%; position: relative; }

        /* Sidebar UI */
        #sidebar {
            width: 380px; background: #191919; border-left: 1px solid #444;
            padding: 25px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; color: #ddd; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        .section-header { color: #0078d4; margin: 0 0 10px 0; font-size: 1.2em; border-bottom: 2px solid #333; padding-bottom: 5px; }
        
        /* Location Navigation */
        .nav-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 5px; }
        .loc-btn {
            background: #252525; color: #eee; border: 1px solid #444;
            padding: 12px; border-radius: 6px; cursor: pointer; text-align: left;
            transition: all 0.2s ease; font-size: 0.9em;
        }
        .loc-btn:hover { background: #333; border-color: #0078d4; }
        .loc-btn small { color: #888; display: block; margin-top: 3px; }

        /* Chart Cards */
        .chart-card { background: #222; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .chart-title { font-size: 11px; font-weight: bold; color: #777; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        canvas { width: 100% !important; height: 210px !important; }

        /* Top Overlay Controls */
        #powerControls {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 8px;
            background: rgba(25, 25, 25, 0.9); padding: 8px 12px; border-radius: 30px;
            border: 1px solid #444; backdrop-filter: blur(4px);
        }

        .toggle-btn {
            padding: 6px 14px; cursor: pointer; border: 1px solid #444;
            border-radius: 18px; background: #333; color: #999; font-size: 11px;
            font-weight: 600; text-transform: uppercase; transition: 0.2s;
        }
        .toggle-btn.active { background: #0078d4; color: #fff; border-color: #00a2ff; }
        
        .footer-note { font-size: 10px; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Map Section -->
        <div id="viewDiv">
            <div id="powerControls">
                <button id="daily" class="toggle-btn active">Daily</button>
                <button id="weekly" class="toggle-btn">Weekly</button>
                <button id="monthly" class="toggle-btn">Monthly</button>
                <button id="yearly" class="toggle-btn">Yearly</button>
            </div>
        </div>

        <!-- Sidebar Section -->
        <div id="sidebar">
            <h2 class="section-header">Operational Infrastructure</h2>
            
            <div class="nav-group">
                <button class="loc-btn" onclick="zoomToCenter('novva')">
                    <strong>Novva Colorado Springs</strong>
                    <small>Operational since 2023 (Phase 1)</small>
                </button>
                <button class="loc-btn" onclick="zoomToCenter('qts')">
                    <strong>QTS Colorado Springs</strong>
                    <small>Operational since ~2014</small>
                </button>
                <button class="loc-btn" onclick="zoomToCenter('t5')">
                    <strong>T5 @ Colorado</strong>
                    <small>Operational since 2014 (First Phase)</small>
                </button>
                <button class="loc-btn" style="opacity: 0.6; cursor: default;">
                    <strong>Project Taurus</strong>
                    <small>In Development / Future Operational</small>
                </button>
            </div>

            <div class="chart-card">
                <div class="chart-title">Electricity Price (¢/kWh)</div>
                <canvas id="priceChart"></canvas>
            </div>

            <div class="chart-card">
                <div class="chart-title">Revenue vs Consumption</div>
                <canvas id="revenueChart"></canvas>
            </div>
            
            <div class="footer-note">
                UCCS GIS Certificate Project | GES 3050<br>
                Markers indicate operational opening dates.
            </div>
        </div>
    </div>

    <script>
        // Full Dataset from provided Excel
        const rawData = [{"Year": 1990, "Price": 7.02, "Rev": 687083, "Sales": 9787280}, {"Year": 1995, "Price": 7.42, "Rev": 838964, "Sales": 11306705}, {"Year": 2000, "Price": 7.31, "Rev": 1024815, "Sales": 14028934}, {"Year": 2005, "Price": 9.06, "Rev": 1489539, "Sales": 16436381}, {"Year": 2010, "Price": 11.04, "Rev": 1997858, "Sales": 18102386}, {"Year": 2014, "Price": 12.18, "Rev": 2203838, "Sales": 18092932}, {"Year": 2015, "Price": 12.12, "Rev": 2227990, "Sales": 18384936}, {"Year": 2016, "Price": 12.07, "Rev": 2273979, "Sales": 18833722}, {"Year": 2017, "Price": 12.17, "Rev": 2264556, "Sales": 18615000}, {"Year": 2018, "Price": 12.15, "Rev": 2342778, "Sales": 19286952}, {"Year": 2019, "Price": 12.18, "Rev": 2362565, "Sales": 19404743}, {"Year": 2020, "Price": 12.36, "Rev": 2531337, "Sales": 20482502}, {"Year": 2021, "Price": 13.07, "Rev": 2696118, "Sales": 20625005}, {"Year": 2022, "Price": 14.19, "Rev": 2922469, "Sales": 20593942}, {"Year": 2023, "Price": 14.30, "Rev": 2859285, "Sales": 19999333}, {"Year": 2024, "Price": 14.92, "Rev": 3086849, "Sales": 20693690}];
        
        const sortedData = rawData.sort((a, b) => a.Year - b.Year);
        const years = sortedData.map(d => d.Year.toString());

        // Operational Markers: 2014 (QTS/T5) and 2023 (Novva)
        const milestoneMarkers = {
            annotations: {
                open2014: {
                    type: 'line', xMin: '2014', xMax: '2014',
                    borderColor: 'rgba(255, 165, 0, 0.8)', borderWidth: 2, borderDash: [5, 5],
                    label: { content: 'QTS / T5 Open', display: true, position: 'start', backgroundColor: '#ffa500', color: '#000', font: { size: 10, weight: 'bold' } }
                },
                open2023: {
                    type: 'line', xMin: '2023', xMax: '2023',
                    borderColor: 'rgba(0, 255, 204, 0.8)', borderWidth: 2, borderDash: [5, 5],
                    label: { content: 'Novva Open', display: true, position: 'start', backgroundColor: '#00ffcc', color: '#000', font: { size: 10, weight: 'bold' } }
                }
            }
        };

        // Initialize Charts
        new Chart(document.getElementById('priceChart'), {
            type: 'line',
            data: {
                labels: years,
                datasets: [{
                    label: '¢/kWh', data: sortedData.map(d => d.Price),
                    borderColor: '#0078d4', backgroundColor: 'rgba(0, 120, 212, 0.1)',
                    fill: true, tension: 0.3, pointRadius: 2
                }]
            },
            options: {
                plugins: { legend: { display: false }, annotation: milestoneMarkers },
                scales: { 
                    y: { grid: { color: '#333' }, ticks: { color: '#888', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#888', font: { size: 10 } } }
                }
            }
        });

        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: {
                labels: years,
                datasets: [
                    { label: 'Revenue ($M)', data: sortedData.map(d => d.Rev / 1000), backgroundColor: '#dc143c' },
                    { label: 'Sales (GWh)', type: 'line', data: sortedData.map(d => d.Sales / 1000), borderColor: '#fff', borderWidth: 2, yAxisID: 'y1', pointRadius: 0 }
                ]
            },
            options: {
                plugins: { annotation: milestoneMarkers },
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#888', font: { size: 10 } } },
                    y1: { position: 'right', grid: { display: false }, ticks: { color: '#888', font: { size: 10 } } },
                    x: { ticks: { color: '#888', font: { size: 10 } } }
                }
            }
        });

        // Map Logic
        let view; 
        require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], function(Map, SceneView, GeoJSONLayer) {
            const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";
            
            function createRenderer(field) {
                return {
                    type: "unique-value", field: "Category",
                    defaultSymbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [0, 120, 212, 0.5] } }] },
                    uniqueValueInfos: [{ value: "Data Center", symbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [255, 0, 0, 0.9] } }] } }],
                    visualVariables: [{ type: "size", field: field, valueUnit: "meters" }]
                };
            }

            const layer = new GeoJSONLayer({ url: url, renderer: createRenderer("Daily_MWh") });
            view = new SceneView({ container: "viewDiv", map: new Map({ basemap: "dark-gray-vector", layers: [layer] }), camera: { position: [-104.814, 38.90, 9000], tilt: 40 } });

            const dcCoords = { novva: [-104.81435, 39.01406], qts: [-104.877, 38.891], t5: [-104.8025, 38.7962] };
            window.zoomToCenter = (k) => view.goTo({ target: dcCoords[k], zoom: 16, tilt: 65 });

            const fields = { daily: "Daily_MWh", weekly: "Weekly_MWh", monthly: "Monthly_MWh", yearly: "Yearly_MWh" };
            Object.keys(fields).forEach(id => {
                document.getElementById(id).onclick = (e) => {
                    document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
                    e.target.classList.add("active");
                    layer.renderer = createRenderer(fields[id]);
                };
            });
        });
    </script>
</body>
</html>
