<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Springs Infrastructure Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    
    <style>
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; background: #111; color: #ddd; font-family: sans-serif; overflow: hidden; }
        .wrapper { display: grid; grid-template-columns: 1fr 380px; height: 100vh; width: 100vw; }
        #viewDiv { height: 100%; width: 100%; position: relative; background: #151515; }
        
        #powerControls { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; gap: 8px; background: rgba(20,20,20,0.95); 
            padding: 8px 15px; border-radius: 30px; border: 1px solid #444;
        }

        #sidebar { background: #111; border-left: 1px solid #333; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .toggle-btn { background: #333; border: none; color: #aaa; padding: 6px 14px; cursor: pointer; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .toggle-btn.active { background: #0078d4; color: white; }
        
        .loc-btn { background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 14px; border-radius: 8px; cursor: pointer; text-align: left; width: 100%; transition: background 0.2s; }
        .loc-btn:hover { border-color: #0078d4; background: #252525; }

        .chart-card { background: #181818; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .chart-label { font-size: 10px; color: #555; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: bold; }
        canvas { height: 160px !important; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="viewDiv">
        <div id="powerControls">
            <button id="daily" class="toggle-btn active">Daily</button>
            <button id="weekly" class="toggle-btn">Weekly</button>
            <button id="monthly" class="toggle-btn">Monthly</button>
            <button id="yearly" class="toggle-btn">Yearly</button>
        </div>
    </div>

    <div id="sidebar">
        <h2 style="color:#0078d4; margin:0 0 5px 0; font-size: 1.4em;">Infrastructure Map</h2>
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="loc-btn" onclick="zoomTo('novva')"><strong>Novva Colorado Springs</strong><br><small>Built 2023</small></button>
            <button class="loc-btn" onclick="zoomTo('qts')"><strong>QTS Colorado Springs</strong><br><small>Operational 2014</small></button>
            <button class="loc-btn" onclick="zoomTo('taurus')"><strong>Project Taurus</strong><br><small>Planning Phase</small></button>
            <button class="loc-btn" onclick="zoomTo('t5')"><strong>T5 @ Colorado</strong><br><small>Operational 2014</small></button>
        </div>

        <div class="chart-card">
            <div class="chart-label">Price Trend (¢/kWh)</div>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-card">
            <div class="chart-label">Revenue Growth</div>
            <canvas id="revChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Economic Data for Charts
    const data = [{"Year":1990,"Price":7.02,"Rev":687083,"Sales":9787280},{"Year":1995,"Price":7.42,"Rev":838964,"Sales":11306705},{"Year":2000,"Price":7.31,"Rev":1024815,"Sales":14028934},{"Year":2005,"Price":9.06,"Rev":1489539,"Sales":16436381},{"Year":2010,"Price":11.04,"Rev":1997858,"Sales":18102386},{"Year":2014,"Price":12.18,"Rev":2203838,"Sales":18092932},{"Year":2023,"Price":14.3,"Rev":2859285,"Sales":19999333},{"Year":2024,"Price":14.92,"Rev":3086849,"Sales":20693690}];
    const years = data.map(d => d.Year.toString());

    const milestoneAnnos = {
        y14: { type: 'line', xMin: '2014', xMax: '2014', borderColor: '#ffa500', borderDash: [4,4], label: { content: '2014: QTS/T5', display: true, position: 'start', backgroundColor: 'rgba(255,165,0,0.8)', font: { size: 9 } } },
        y23: { type: 'line', xMin: '2023', xMax: '2023', borderColor: '#00ffcc', borderDash: [4,4], label: { content: '2023: Novva', display: true, position: 'end', backgroundColor: 'rgba(0,255,204,0.8)', font: { size: 9 } } }
    };

    const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, annotation: { annotations: milestoneAnnos } }, scales: { x: { ticks: { color: '#444', font: { size: 9 } } }, y: { ticks: { color: '#444', font: { size: 9 } } } } };

    new Chart(document.getElementById('priceChart'), { type: 'line', data: { labels: years, datasets: [{ data: data.map(d=>d.Price), borderColor: '#0078d4', tension: 0.3, pointRadius: 2 }] }, options: commonOptions });
    new Chart(document.getElementById('revChart'), { type: 'bar', data: { labels: years, datasets: [{ data: data.map(d=>d.Rev/1000), backgroundColor: 'rgba(220, 20, 60, 0.7)' }] }, options: commonOptions });

    require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], function(Map, SceneView, GeoJSONLayer) {
        
        const layer = new GeoJSONLayer({ 
            // Corrected file name
            url: "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/Data_Centers_C_FeaturesToJSO.geojson",
            // This ensures context buildings remain visible without overloading the browser
            renderer: { 
                type: "unique-value", 
                field: "Category", 
                defaultSymbol: { 
                    type: "polygon-3d", 
                    symbolLayers: [{ type: "extrude", material: { color: [45, 45, 45, 0.4] }, size: 8 }] 
                },
                uniqueValueInfos: [{ 
                    value: "Data Center", 
                    symbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [220, 20, 60, 0.95] }, size: 45 }] } 
                }]
            } 
        });

        const view = new SceneView({ 
            container: "viewDiv", 
            map: new Map({ basemap: "dark-gray-vector", layers: [layer] }), 
            camera: { position: [-104.821, 38.833, 10000], tilt: 35 },
            qualityProfile: "low",
            environment: { starsEnabled: false, atmosphere: { quality: "low" } }
        });
        
        const points = { 
            novva: [-104.814, 39.014], 
            qts: [-104.877, 38.891], 
            taurus: [-104.878, 38.892], 
            t5: [-104.802, 38.796] 
        };

        window.zoomTo = (k) => {
            view.goTo({ target: points[k], zoom: 16, tilt: 55 }, { speedFactor: 1.5 });
        };
    });
</script>
</body>
</html>
