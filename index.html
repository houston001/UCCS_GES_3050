<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Springs Data Infrastructure</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    
    <style>
        /* Force the body to stay put */
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; overflow: hidden; background: #111; color: #ddd; font-family: sans-serif; }
        
        /* Fixed Layout: Map on left, Sidebar on right */
        .wrapper { display: flex; width: 100vw; height: 100vh; }
        
        #viewDiv { 
            flex-grow: 1; 
            height: 100%; 
            position: relative; 
            background: #1a1a1a; /* Visual placeholder while map loads */
        }

        #sidebar {
            width: 380px; 
            min-width: 380px;
            height: 100%;
            background: #191919; 
            border-left: 1px solid #444;
            padding: 20px; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Buttons and Overlays */
        #powerControls {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            display: flex; gap: 5px; background: rgba(0,0,0,0.8);
            padding: 8px; border-radius: 8px; border: 1px solid #444;
        }
        .toggle-btn { 
            background: #333; border: none; color: #aaa; padding: 6px 12px; 
            cursor: pointer; border-radius: 4px; font-size: 11px; 
        }
        .toggle-btn.active { background: #0078d4; color: white; }

        .loc-btn {
            background: #252525; border: 1px solid #444; color: #eee;
            padding: 12px; border-radius: 6px; cursor: pointer; text-align: left;
            width: 100%;
        }
        .loc-btn:hover { border-color: #0078d4; background: #2a2a2a; }

        .chart-card { background: #222; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        canvas { height: 180px !important; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="viewDiv">
        <div id="powerControls">
            <button id="daily" class="toggle-btn active">Daily</button>
            <button id="weekly" class="toggle-btn">Weekly</button>
            <button id="monthly" class="toggle-btn">Monthly</button>
            <button id="yearly" class="toggle-btn">Yearly</button>
        </div>
    </div>

    <div id="sidebar">
        <h3 style="color:#0078d4; margin:0;">Facility Infrastructure</h3>
        
        <div class="nav-group">
            <button class="loc-btn" onclick="zoomTo('novva')">
                <strong>Novva Colorado Springs</strong><br><small>Opened 2023</small>
            </button>
            <button class="loc-btn" onclick="zoomTo('qts')">
                <strong>QTS Colorado Springs</strong><br><small>Operational ~2014</small>
            </button>
            <button class="loc-btn" onclick="zoomTo('t5')">
                <strong>T5 @ Colorado</strong><br><small>Operational 2014</small>
            </button>
        </div>

        <div class="chart-card">
            <div style="font-size:11px; color:#888; margin-bottom:8px;">PRICE TREND (¢/kWh)</div>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-card">
            <div style="font-size:11px; color:#888; margin-bottom:8px;">REVENUE VS SALES</div>
            <canvas id="revChart"></canvas>
        </div>
        
        <div style="font-size:10px; color:#555; text-align:center;">
            Data from EIA Utility Records (1990-2024)<br>
            Markers show operational milestones.
        </div>
    </div>
</div>

<script>
    // Data integration from your Excel file
    const data = [{"Year":1990,"Price":7.02,"Rev":687083,"Sales":9787280},{"Year":1995,"Price":7.42,"Rev":838964,"Sales":11306705},{"Year":2000,"Price":7.31,"Rev":1024815,"Sales":14028934},{"Year":2005,"Price":9.06,"Rev":1489539,"Sales":16436381},{"Year":2010,"Price":11.04,"Rev":1997858,"Sales":18102386},{"Year":2014,"Price":12.18,"Rev":2203838,"Sales":18092932},{"Year":2023,"Price":14.30,"Rev":2859285,"Sales":19999333},{"Year":2024,"Price":14.92,"Rev":3086849,"Sales":20693690}].sort((a,b)=>a.Year-b.Year);
    
    const years = data.map(d => d.Year.toString());
    const milestones = {
        annotations: {
            y14: { type: 'line', xMin: '2014', xMax: '2014', borderColor: '#ffa500', borderDash: [5,5], label: { content: '2014 Openings', display: true, position: 'start' } },
            y23: { type: 'line', xMin: '2023', xMax: '2023', borderColor: '#00ffcc', borderDash: [5,5], label: { content: '2023 Novva', display: true, position: 'start' } }
        }
    };

    new Chart(document.getElementById('priceChart'), {
        type: 'line',
        data: { labels: years, datasets: [{ data: data.map(d=>d.Price), borderColor: '#0078d4', tension: 0.3 }] },
        options: { plugins: { legend: { display: false }, annotation: milestones } }
    });

    new Chart(document.getElementById('revChart'), {
        type: 'bar',
        data: { labels: years, datasets: [{ label: 'Rev', data: data.map(d=>d.Rev/1000), backgroundColor: '#dc143c' }, { label: 'Sales', type: 'line', data: data.map(d=>d.Sales/1000), borderColor: '#fff', yAxisID: 'y1' }] },
        options: { plugins: { annotation: milestones }, scales: { y1: { position: 'right' } } }
    });

    // ArcGIS Implementation
    require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], function(Map, SceneView, GeoJSONLayer) {
        const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";
        
        const layer = new GeoJSONLayer({ 
            url: url, 
            renderer: {
                type: "unique-value", field: "Category",
                defaultSymbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [0, 120, 212, 0.4] } }] },
                uniqueValueInfos: [{ value: "Data Center", symbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [255, 0, 0, 0.9] } }] } }],
                visualVariables: [{ type: "size", field: "Daily_MWh", valueUnit: "meters" }]
            }
        });

        const view = new SceneView({ 
            container: "viewDiv", 
            map: new Map({ basemap: "dark-gray-vector", layers: [layer] }),
            camera: { position: [-104.821, 38.833, 12000], tilt: 35 }
        });

        // Corrected Coordinates for COS
        const points = {
            novva: [-104.814, 39.014],
            qts: [-104.877, 38.891],
            t5: [-104.802, 38.796]
        };

        window.zoomTo = (k) => view.goTo({ target: points[k], zoom: 16, tilt: 60 });
        
        // Refresh the view size to fix the "loading only 1/4" bug
        view.when(() => {
            setTimeout(() => { view.container.style.height = "100%"; }, 500);
        });
    });
</script>

</body>
</html>
