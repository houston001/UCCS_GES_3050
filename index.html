<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Data Center Dashboard</title>
    <style>
        /* Layout Setup */
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; overflow: hidden; background: #111; }
        
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        #viewDiv { 
            flex: 1; /* Map takes up all remaining space */
            height: 100%; 
        }

        /* The New Sidebar */
        #sidebar {
            width: 350px;
            background: #191919;
            border-left: 1px solid #444;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            color: #ddd;
            font-family: sans-serif;
        }

        .chart-card {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .chart-card img {
            width: 100%;
            border-radius: 4px;
            margin-top: 10px;
        }

        /* Power Controls (Top Center of Map) */
        #powerContainer {
            position: absolute; top: 10px; left: 40%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: row; gap: 10px;
            background: rgba(25, 25, 25, 0.9); padding: 10px 15px; border-radius: 30px;
            border: 1px solid #444;
        }

        /* Location Controls (Now inside Sidebar or floating) */
        #locationContainer {
            display: flex; flex-direction: column; gap: 8px;
            margin-bottom: 20px;
        }

        button {
            padding: 8px 12px; cursor: pointer; border: 1px solid #444;
            border-radius: 20px; background: #333; color: #ddd;
            font-size: 12px; transition: 0.2s;
        }
        
        button:hover { background: #444; color: #fff; }
        .active { background: #0078d4; color: #fff; border-color: #0086ed; }
        .loc-btn { width: 100%; border-radius: 4px; text-align: left; }
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
</head>
<body>

    <div class="main-container">
        <!-- Map Section -->
        <div id="viewDiv">
            <div id="powerContainer">
                <button id="daily" class="active">Daily</button>
                <button id="weekly">Weekly</button>
                <button id="monthly">Monthly</button>
                <button id="yearly">Yearly</button>
            </div>
        </div>

        <!-- Sidebar Section -->
        <div id="sidebar">
            <h3 style="color: #0078d4; margin-top: 0;">Control Panel</h3>
            
            <div id="locationContainer">
                <div style="font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.7;">JUMP TO DATA CENTER</div>
                <button class="loc-btn" onclick="zoomToCenter('novva')">Novva COS</button>
                <button class="loc-btn" onclick="zoomToCenter('qts')">QTS COS</button>
                <button class="loc-btn" onclick="zoomToCenter('t5')">T5@Colorado</button>
                <button class="loc-btn" onclick="zoomToCenter('taurus')">Project Taurus</button>
                <button class="loc-btn" onclick="zoomToCenter('full')" style="margin-top:5px; opacity:0.6;">Reset View</button>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">

            <!-- Chart 1 -->
            <div class="chart-card">
                <div style="font-size: 12px; font-weight: bold;">Price Trends (Colorado)</div>
                <img src="elec_trends_with_milestones.png" alt="Electricity Rates Chart">
                <p style="font-size: 10px; color: #888; margin-top: 8px;">*Vertical lines indicate Data Center opening phases.</p>
            </div>

            <!-- Chart 2 Placeholder (If you split the image) -->
            <div class="chart-card">
                <div style="font-size: 12px; font-weight: bold;">Sales vs Revenue</div>
                <p style="font-size: 11px; margin-top: 10px;">Industrial consumption shows steady growth alongside infrastructure expansion.</p>
            </div>
        </div>
    </div>

    <script>
        let view; 
        require([
            "esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"
        ], function(Map, SceneView, GeoJSONLayer) {

            const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";

            function createRenderer(columnName) {
                return {
                    type: "unique-value", 
                    field: "Category",    
                    defaultSymbol: {
                        type: "polygon-3d",
                        symbolLayers: [{
                            type: "extrude",
                            material: { color: [0, 120, 212, 0.6] },
                            edges: { type: "solid", color: [255, 255, 255, 0.2], size: 0.5 }
                        }]
                    },
                    uniqueValueInfos: [{
                        value: "Data Center", 
                        symbol: {
                            type: "polygon-3d",
                            symbolLayers: [{
                                type: "extrude",
                                material: { color: [255, 0, 0, 0.9] }, 
                                edges: { type: "solid", color: [255, 255, 255, 0.8], size: 1.5 }
                            }]
                        }
                    }],
                    visualVariables: [{
                        type: "size",
                        field: columnName,
                        valueUnit: "meters"
                    }]
                };
            }

            const layer = new GeoJSONLayer({
                url: url,
                renderer: createRenderer("Daily_MWh"),
                outFields: ["*"]
            });

            const map = new Map({
                basemap: "dark-gray-vector",
                ground: "world-elevation",
                layers: [layer]
            });

            view = new SceneView({
                container: "viewDiv",
                map: map,
                camera: { position: [-104.81435, 38.9000, 8000], tilt: 45 }
            });

            const locations = {
                novva: { center: [-104.81435, 39.01406], zoom: 16, tilt: 70 },
                qts: { center: [-104.8477, 38.91806], zoom: 16, tilt: 70 },
                t5: { center: [-104.8025, 38.7962], zoom: 16, tilt: 70 },
                taurus: { center: [-104.8577, 38.89405], zoom: 16, tilt: 70 }
            };

            window.zoomToCenter = function(key) {
                if (key === 'full') { view.goTo(layer.fullExtent); } 
                else { view.goTo(locations[key]); }
            };

            const fieldMap = { daily: "Daily_MWh", weekly: "Weekly_MWh", monthly: "Monthly_MWh", yearly: "Yearly_MWh" };
            Object.keys(fieldMap).forEach(id => {
                document.getElementById(id).onclick = function(e) {
                    document.querySelectorAll("#powerContainer button").forEach(b => b.classList.remove("active"));
                    e.target.classList.add("active");
                    layer.renderer = createRenderer(fieldMap[id]);
                };
            });
        });
    </script>
</body>
</html>
