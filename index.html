<!DOCTYPE html>
<html>
<head>
    <title>Infrastructure Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; display: grid; grid-template-columns: 1fr 350px; height: 100vh; background: #111; color: #eee; font-family: sans-serif; }
        #map-container { position: relative; border-right: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        #sidebar { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .chart-card { background: #181818; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        canvas { height: 150px !important; }
    </style>
</head>
<body>
    <div id="map-container">
        <!-- This calls your second file -->
        <iframe src="map.html" id="mapFrame"></iframe>
    </div>

    <div id="sidebar">
        <h2>Analytics</h2>
        <div class="chart-card">
            <canvas id="priceChart"></canvas>
        </div>
        <div class="chart-card">
            <canvas id="revChart"></canvas>
        </div>
        <button onclick="zoomMap('novva')">Zoom to Novva</button>
    </div>

    <script>
        // Standard Chart.js setup here...
        // To talk to the map, we use postMessage
        function zoomMap(location) {
            const frame = document.getElementById('mapFrame').contentWindow;
            frame.postMessage({ type: 'ZOOM', target: location }, '*');
        }
    </script>
</body>
</html>
