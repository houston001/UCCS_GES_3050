<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Springs Data Infrastructure</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    
    <style>
        /* Force full screen and prevent the black void */
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; background: #111; color: #ddd; font-family: sans-serif; overflow: hidden; }
        
        .wrapper { 
            display: grid; 
            grid-template-columns: 1fr 380px; 
            height: 100vh; 
            width: 100vw; 
        }

        #viewDiv { 
            height: 100%; 
            width: 100%; 
            position: relative; 
            background: #1a1a1a; 
            outline: none;
        }
        
        #powerControls { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; gap: 8px; background: rgba(0,0,0,0.8); 
            padding: 8px 15px; border-radius: 30px; border: 1px solid #444;
        }

        #sidebar { 
            background: #151515; border-left: 1px solid #333; 
            padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; 
        }
        
        .toggle-btn { background: #333; border: none; color: #aaa; padding: 6px 14px; cursor: pointer; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .toggle-btn.active { background: #0078d4; color: white; }
        
        .loc-btn { background: #222; border: 1px solid #333; color: #eee; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; width: 100%; }
        .loc-btn:hover { border-color: #0078d4; background: #282828; }
        .loc-btn small { color: #777; font-size: 10px; }

        .chart-card { background: #1d1d1d; padding: 15px; border-radius: 10px; border: 1px solid #2a2a2a; }
        .chart-label { font-size: 10px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        canvas { height: 180px !important; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="viewDiv">
        <div id="powerControls">
            <button id="daily" class="toggle-btn active">Daily</button>
            <button id="weekly" class="toggle-btn">Weekly</button>
            <button id="monthly" class="toggle-btn">Monthly</button>
            <button id="yearly" class="toggle-btn">Yearly</button>
        </div>
    </div>

    <div id="sidebar">
        <h3 style="color:#0078d4; margin:0 0 10px 0; font-size: 1.2em;">Facility Infrastructure</h3>
        
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="loc-btn" onclick="zoomTo('novva')"><strong>Novva Colorado Springs</strong><br><small>Opened 2023</small></button>
            <button class="loc-btn" onclick="zoomTo('qts')"><strong>QTS Colorado Springs</strong><br><small>Operational ~2014</small></button>
            <button class="loc-btn" onclick="zoomTo('taurus')"><strong>Project Taurus</strong><br><small>In Development</small></button>
            <button class="loc-btn" onclick="zoomTo('t5')"><strong>T5 @ Colorado</strong><br><small>Operational 2014</small></button>
        </div>

        <div class="chart-card">
            <div class="chart-label">Price Trend (¢/kWh)</div>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-card">
            <div class="chart-label">Revenue vs Sales</div>
            <canvas id="revChart"></canvas>
        </div>
    </div>
</div>

<script>
    const data = [{"Year":1990,"Price":7.02,"Rev":687083,"Sales":9787280},{"Year":1995,"Price":7.42,"Rev":838964,"Sales":11306705},{"Year":2000,"Price":7.31,"Rev":1024815,"Sales":14028934},{"Year":2005,"Price":9.06,"Rev":1489539,"Sales":16436381},{"Year":2010,"Price":11.04,"Rev":1997858,"Sales":18102386},{"Year":2014,"Price":12.18,"Rev":2203838,"Sales":18092932},{"Year":2023,"Price":14.3,"Rev":2859285,"Sales":19999333},{"Year":2024,"Price":14.92,"Rev":3086849,"Sales":20693690}].sort((a,b)=>a.Year-b.Year);
    const years = data.map(d => d.Year.toString());

    // Staggering the markers so they don't overlap awkwardly
    const milestoneAnnos = {
        y14: { 
            type: 'line', xMin: '2014', xMax: '2014', borderColor: '#ffa500', borderDash: [4,4],
            label: { content: '2014: QTS/T5', display: true, position: 'start', backgroundColor: 'rgba(255,165,0,0.8)', yAdjust: -15, font: { size: 9 } } 
        },
        y23: { 
            type: 'line', xMin: '2023', xMax: '2023', borderColor: '#00ffcc', borderDash: [4,4],
            label: { content: '2023: Novva', display: true, position: 'end', backgroundColor: 'rgba(0,255,204,0.8)', yAdjust: 15, font: { size: 9 } } 
        }
    };

    const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, annotation: { annotations: milestoneAnnos } }, scales: { x: { ticks: { color: '#555', font: { size: 9 } } }, y: { ticks: { color: '#555', font: { size: 9 } } } } };

    new Chart(document.getElementById('priceChart'), { type: 'line', data: { labels: years, datasets: [{ data: data.map(d=>d.Price), borderColor: '#0078d4', tension: 0.3, pointRadius: 2 }] }, options: commonOptions });
    new Chart(document.getElementById('revChart'), { type: 'bar', data: { labels: years, datasets: [{ data: data.map(d=>d.Rev/1000), backgroundColor: 'rgba(220, 20, 60, 0.6)' }, { type: 'line', data: data.map(d=>d.Sales/1000), borderColor: '#fff', yAxisID: 'y1', pointRadius: 0 }] }, options: { ...commonOptions, scales: { ...commonOptions.scales, y1: { position: 'right', display: false } } } });

    require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], function(Map, SceneView, GeoJSONLayer) {
        const layer = new GeoJSONLayer({ 
            url: "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson",
            renderer: { 
                type: "unique-value", field: "Category", 
                defaultSymbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [40, 40, 40, 0.5] } }] },
                uniqueValueInfos: [{ value: "Data Center", symbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [220, 20, 60, 0.9] } }] } }]
            } 
        });

        const view = new SceneView({ 
            container: "viewDiv", 
            map: new Map({ basemap: "dark-gray-vector", layers: [layer] }), 
            camera: { position: [-104.821, 38.833, 15000], tilt: 40 } 
        });
        
        const points = { 
            novva: [-104.814, 39.014], 
            qts: [-104.877, 38.891], 
            taurus: [-104.878, 38.892], 
            t5: [-104.802, 38.796] 
        };

        window.zoomTo = (k) => view.goTo({ target: points[k], zoom: 16, tilt: 60 });
        
        // This ensures the map fills the container after initialization
        view.when(() => { 
            console.log("Map ready");
            // Small delay to let the browser finalize the grid layout
            setTimeout(() => { view.container.style.height = "100%"; }, 200);
        });
    });
</script>
</body>
</html>
