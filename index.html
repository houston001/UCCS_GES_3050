<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Data Center Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    
    <style>
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        .main-container { display: flex; height: 100vh; width: 100vw; }
        #viewDiv { flex: 1; height: 100%; position: relative; }

        #sidebar {
            width: 380px; background: #191919; border-left: 1px solid #444;
            padding: 25px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; color: #ddd;
        }

        .section-title { color: #0078d4; margin: 0 0 10px 0; font-size: 1.1em; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .loc-btn {
            background: #252525; color: #eee; border: 1px solid #444;
            padding: 10px; border-radius: 4px; cursor: pointer; text-align: left;
            font-size: 0.85em; transition: 0.2s;
        }
        .loc-btn:hover { background: #333; border-color: #0078d4; }

        .chart-card { background: #222; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        .chart-label { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        canvas { width: 100% !important; height: 200px !important; }

        #powerContainer {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 5px;
            background: rgba(20, 20, 20, 0.9); padding: 6px; border-radius: 30px; border: 1px solid #444;
        }

        .toggle-btn {
            padding: 6px 14px; cursor: pointer; border: none;
            border-radius: 20px; background: transparent; color: #888; font-size: 10px;
            font-weight: 700; transition: 0.2s;
        }
        .toggle-btn.active { background: #0078d4; color: #fff; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="viewDiv">
            <div id="powerContainer">
                <button id="daily" class="toggle-btn active">Daily</button>
                <button id="weekly" class="toggle-btn">Weekly</button>
                <button id="monthly" class="toggle-btn">Monthly</button>
                <button id="yearly" class="toggle-btn">Yearly</button>
            </div>
        </div>

        <div id="sidebar">
            <h2 class="section-title">Colorado Springs Facilities</h2>
            
            <div class="btn-group">
                <button class="loc-btn" onclick="zoomToCenter('novva')"><strong>Novva COS</strong><br>Opened 2023</button>
                <button class="loc-btn" onclick="zoomToCenter('taurus')"><strong>Project Taurus</strong><br>Operational 2018</button>
                <button class="loc-btn" onclick="zoomToCenter('qts')"><strong>QTS Data Center</strong><br>Operational 2014</button>
                <button class="loc-btn" onclick="zoomToCenter('t5')"><strong>T5 @ Colorado</strong><br>Operational 2014</button>
            </div>

            <div class="chart-card">
                <div class="chart-label">Rate Analysis (¢/kWh)</div>
                <canvas id="priceChart"></canvas>
            </div>

            <div class="chart-card">
                <div class="chart-label">Revenue vs Sales Volume</div>
                <canvas id="revenueChart"></canvas>
            </div>
            
            <p style="font-size: 9px; color: #555; text-align: center;">
                UCCS GIS Certificate Project - 2026<br>
                Source: EIA Total Electric Industry
            </p>
        </div>
    </div>

    <script>
        const rawData = [{"Year": 1990, "Price": 7.02, "Rev": 687083, "Sales": 9787280}, {"Year": 1995, "Price": 7.42, "Rev": 838964, "Sales": 11306705}, {"Year": 2000, "Price": 7.31, "Rev": 1024815, "Sales": 14028934}, {"Year": 2005, "Price": 9.06, "Rev": 1489539, "Sales": 16436381}, {"Year": 2010, "Price": 11.04, "Rev": 1997858, "Sales": 18102386}, {"Year": 2014, "Price": 12.18, "Rev": 2203838, "Sales": 18092932}, {"Year": 2018, "Price": 12.15, "Rev": 2342778, "Sales": 19286952}, {"Year": 2023, "Price": 14.30, "Rev": 2859285, "Sales": 19999333}, {"Year": 2024, "Price": 14.92, "Rev": 3086849, "Sales": 20693690}];
        const sortedData = rawData.sort((a, b) => a.Year - b.Year);
        const years = sortedData.map(d => d.Year.toString());

        const markers = {
            annotations: {
                m1: { type: 'line', xMin: '2014', xMax: '2014', borderColor: '#ffa500', borderWidth: 1, borderDash: [4, 4], label: { content: 'QTS/T5', display: true, position: 'start', font: { size: 9 } } },
                m2: { type: 'line', xMin: '2018', xMax: '2018', borderColor: '#ff4500', borderWidth: 1, borderDash: [4, 4], label: { content: 'Taurus', display: true, position: 'start', font: { size: 9 } } },
                m3: { type: 'line', xMin: '2023', xMax: '2023', borderColor: '#00ffcc', borderWidth: 1, borderDash: [4, 4], label: { content: 'Novva', display: true, position: 'start', font: { size: 9 } } }
            }
        };

        new Chart(document.getElementById('priceChart'), {
            type: 'line',
            data: { labels: years, datasets: [{ label: '¢/kWh', data: sortedData.map(d => d.Price), borderColor: '#0078d4', tension: 0.3, pointRadius: 2 }] },
            options: { plugins: { legend: { display: false }, annotation: markers }, scales: { y: { ticks: { color: '#666', font: { size: 9 } } }, x: { ticks: { color: '#666', font: { size: 9 } } } } }
        });

        new Chart(document.getElementById('revenueChart'), {
            type: 'bar',
            data: { 
                labels: years, 
                datasets: [
                    { label: 'Rev', data: sortedData.map(d => d.Rev / 1000), backgroundColor: '#dc143c' },
                    { label: 'Sales', type: 'line', data: sortedData.map(d => d.Sales / 1000), borderColor: '#fff', yAxisID: 'y1', pointRadius: 0 }
                ] 
            },
            options: { plugins: { legend: { display: false }, annotation: markers }, scales: { y: { ticks: { font: { size: 9 } } }, y1: { position: 'right' } } }
        });

        let view; 
        require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], function(Map, SceneView, GeoJSONLayer) {
            const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";
            function createRenderer(col) {
                return {
                    type: "unique-value", field: "Category",
                    defaultSymbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [0, 120, 212, 0.4] } }] },
                    uniqueValueInfos: [{ value: "Data Center", symbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [255, 0, 0, 0.8] } }] } }],
                    visualVariables: [{ type: "size", field: col, valueUnit: "meters" }]
                };
            }
            const layer = new GeoJSONLayer({ url: url, renderer: createRenderer("Daily_MWh") });
            view = new SceneView({ container: "viewDiv", map: new Map({ basemap: "dark-gray-vector", layers: [layer] }), camera: { position: [-104.821, 38.833, 10000], tilt: 30 } });

            const locs = { 
                novva: [-104.814, 39.014], 
                taurus: [-104.878, 38.892], 
                qts: [-104.877, 38.891], 
                t5: [-104.802, 38.796] 
            };
            window.zoomToCenter = (k) => view.goTo({ target: locs[k], zoom: 17, tilt: 60 });
        });
    </script>
</body>
</html>
