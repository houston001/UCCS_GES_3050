<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Webpage and charts</title>
    <style>
        html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; }
        
        /* Power Controls (Top Center) */
        #powerContainer {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: row; gap: 10px;
            background: rgba(25, 25, 25, 0.9); padding: 12px 20px; border-radius: 30px;
            color: #fff; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        /* Location Controls (Left) */
        #locationContainer {
            position: absolute; top: 80px; left: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px;
            background: rgba(25, 25, 25, 0.9); padding: 15px; border-radius: 6px;
            color: #fff; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        button {
            padding: 8px 15px; cursor: pointer; border: 1px solid #444;
            border-radius: 20px; background: #333; color: #ddd;
            transition: 0.2s all; font-size: 13px;
        }
        #locationContainer button { border-radius: 4px; text-align: left; }
        
        button:hover { background: #444; color: #fff; }
        .active { background: #0078d4; color: #fff; border-color: #0086ed; }
        .loc-btn { background: #222; border-color: #555; }
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
</head>
<body>
    <div id="powerContainer">
        <button id="daily" class="active">Daily Usage</button>
        <button id="weekly">Weekly Usage</button>
        <button id="monthly">Monthly Usage</button>
        <button id="yearly">Yearly Usage</button>
    </div>

    <div id="locationContainer">
        <div style="margin-bottom: 10px; font-size: 11px; font-weight: bold; color: #0078d4; text-transform: uppercase;">Data Centers</div>
        <button class="loc-btn" onclick="zoomToCenter('novva')">Novva COS</button>
        <button class="loc-btn" onclick="zoomToCenter('qts')">QTS COS</button>
        <button class="loc-btn" onclick="zoomToCenter('t5')">T5@Colorado</button>
        <button class="loc-btn" onclick="zoomToCenter('taurus')">Project Taurus</button>
        <hr style="width:100%; border:0; border-top:1px solid #444; margin:5px 0;">
        <button class="loc-btn" onclick="zoomToCenter('full')">Reset View</button>
    </div>

    <div id="viewDiv"></div>

    <script>
        let view; 

        require([
            "esri/Map",
            "esri/views/SceneView",
            "esri/layers/GeoJSONLayer"
        ], function(Map, SceneView, GeoJSONLayer) {

            const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";

            function createRenderer(columnName) {
                return {
                    type: "unique-value", 
                    field: "Category",    
                    defaultSymbol: {
                        type: "polygon-3d",
                        symbolLayers: [{
                            type: "extrude",
                            material: { color: [0, 120, 212, 0.6] },
                            edges: { type: "solid", color: [255, 255, 255, 0.2], size: 0.5 }
                        }]
                    },
                    uniqueValueInfos: [{
                        value: "Data Center", 
                        symbol: {
                            type: "polygon-3d",
                            symbolLayers: [{
                                type: "extrude",
                                material: { color: [255, 0, 0, 0.9] }, 
                                edges: { type: "solid", color: [255, 255, 255, 0.8], size: 1.5 }
                            }]
                        }
                    }],
                    visualVariables: [{
                        type: "size",
                        field: columnName,
                        valueUnit: "meters"
                    }]
                };
            }

            const layer = new GeoJSONLayer({
                url: url,
                renderer: createRenderer("Daily_MWh"),
                outFields: ["*"]
            });

            const map = new Map({
                basemap: "dark-gray-vector",
                ground: "world-elevation",
                layers: [layer]
            });

            view = new SceneView({
                container: "viewDiv",
                map: map,
                camera: {
                    position: [-104.81435, 38.9000, 8000],
                    tilt: 45
                }
            });

            // Specific Coordinates Provided
            const locations = {
                novva: { center: [-104.81435, 39.01406], zoom: 16, tilt: 70 },
                qts: { center: [-104.8477, 38.91806], zoom: 16, tilt: 70 },
                t5: { center: [-104.8025, 38.7962], zoom: 16, tilt: 70 },
                taurus: { center: [-104.8577, 38.89405], zoom: 16, tilt: 70 }
            };

            window.zoomToCenter = function(key) {
                if (key === 'full') {
                    view.goTo(layer.fullExtent);
                } else {
                    view.goTo(locations[key]);
                }
            };

            const fieldMap = { daily: "Daily_MWh", weekly: "Weekly_MWh", monthly: "Monthly_MWh", yearly: "Yearly_MWh" };
            Object.keys(fieldMap).forEach(id => {
                document.getElementById(id).onclick = function(e) {
                    document.querySelectorAll("#powerContainer button").forEach(b => b.classList.remove("active"));
                    e.target.classList.add("active");
                    layer.renderer = createRenderer(fieldMap[id]);
                };
            });

            layer.when(() => {
                view.goTo(layer.fullExtent);
            });
        });
    </script>
</body>
</html>
