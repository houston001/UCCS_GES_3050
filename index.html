<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colorado Springs Data Infrastructure</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    
    <style>
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; overflow: hidden; background: #111; color: #ddd; font-family: sans-serif; }
        .wrapper { display: flex; width: 100vw; height: 100vh; }
        
        /* Map Section */
        #viewDiv { flex-grow: 1; height: 100%; position: relative; background: #1a1a1a; }
        
        /* Floating Top-Center Controls */
        #powerControls { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; gap: 5px; background: rgba(0,0,0,0.85); 
            padding: 8px; border-radius: 30px; border: 1px solid #444; backdrop-filter: blur(5px);
        }

        /* Sidebar Section */
        #sidebar { width: 380px; min-width: 380px; height: 100%; background: #191919; border-left: 1px solid #444; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .toggle-btn { background: #333; border: none; color: #aaa; padding: 6px 14px; cursor: pointer; border-radius: 20px; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .toggle-btn.active { background: #0078d4; color: white; }
        
        .loc-btn { background: #252525; border: 1px solid #444; color: #eee; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; width: 100%; transition: 0.2s; }
        .loc-btn:hover { border-color: #0078d4; background: #2a2a2a; }
        .loc-btn small { color: #888; }

        .chart-card { background: #222; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        canvas { height: 200px !important; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="viewDiv">
        <div id="powerControls">
            <button id="daily" class="toggle-btn active">Daily</button>
            <button id="weekly" class="toggle-btn">Weekly</button>
            <button id="monthly" class="toggle-btn">Monthly</button>
            <button id="yearly" class="toggle-btn">Yearly</button>
        </div>
    </div>

    <div id="sidebar">
        <h3 style="color:#0078d4; margin:0; border-bottom: 1px solid #333; padding-bottom: 10px;">Infrastructure Analysis</h3>
        
        <div class="nav-group" style="display: flex; flex-direction: column; gap: 8px;">
            <button class="loc-btn" onclick="zoomTo('novva')">
                <strong>Novva Colorado Springs</strong><br><small>Opened 2023</small>
            </button>
            <button class="loc-btn" onclick="zoomTo('qts')">
                <strong>QTS Colorado Springs</strong><br><small>Operational ~2014</small>
            </button>
            <button class="loc-btn" onclick="zoomTo('taurus')">
                <strong>Project Taurus</strong><br><small>In Development</small>
            </button>
            <button class="loc-btn" onclick="zoomTo('t5')">
                <strong>T5 @ Colorado</strong><br><small>Operational 2014</small>
            </button>
        </div>

        <div class="chart-card">
            <div style="font-size:11px; color:#888; margin-bottom:8px; font-weight: bold;">PRICE TREND (¢/kWh)</div>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-card">
            <div style="font-size:11px; color:#888; margin-bottom:8px; font-weight: bold;">REVENUE VS SALES</div>
            <canvas id="revChart"></canvas>
        </div>

        <p style="font-size: 10px; color: #555; text-align: center;">
            UCCS GIS Certificate Project<br>
            Data: EIA Utility Records (1990-2024)
        </p>
    </div>
</div>

<script>
    // Data from Elec_Rates.xlsx
    const data = [{"Year":1990,"Price":7.02,"Rev":687083,"Sales":9787280},{"Year":1995,"Price":7.42,"Rev":838964,"Sales":11306705},{"Year":2000,"Price":7.31,"Rev":1024815,"Sales":14028934},{"Year":2005,"Price":9.06,"Rev":1489539,"Sales":16436381},{"Year":2010,"Price":11.04,"Rev":1997858,"Sales":18102386},{"Year":2014,"Price":12.18,"Rev":2203838,"Sales":18092932},{"Year":2023,"Price":14.3,"Rev":2859285,"Sales":19999333},{"Year":2024,"Price":14.92,"Rev":3086849,"Sales":20693690}].sort((a,b)=>a.Year-b.Year);
    const years = data.map(d => d.Year.toString());

    // Better spacing for labels to stop the "weird" overlapping
    const milestoneAnnos = {
        y14: { 
            type: 'line', xMin: '2014', xMax: '2014', 
            borderColor: '#ffa500', borderDash: [5,5], borderWidth: 2,
            label: { content: '2014: QTS/T5', display: true, position: 'start', backgroundColor: 'rgba(255,165,0,0.9)', color: '#000', yAdjust: -20, font: { size: 10, weight: 'bold' } } 
        },
        y23: { 
            type: 'line', xMin: '2023', xMax: '2023', 
            borderColor: '#00ffcc', borderDash: [5,5], borderWidth: 2,
            label: { content: '2023: Novva', display: true, position: 'start', backgroundColor: 'rgba(0,255,204,0.9)', color: '#000', yAdjust: 30, font: { size: 10, weight: 'bold' } } 
        }
    };

    const commonOptions = { 
        responsive: true, maintainAspectRatio: false, 
        plugins: { legend: { display: false }, annotation: { annotations: milestoneAnnos } }, 
        scales: { x: { ticks: { color: '#666', font: { size: 10 } } }, y: { ticks: { color: '#666', font: { size: 10 } } } } 
    };

    new Chart(document.getElementById('priceChart'), { 
        type: 'line', 
        data: { labels: years, datasets: [{ data: data.map(d=>d.Price), borderColor: '#0078d4', tension: 0.3, pointBackgroundColor: '#0078d4', fill: true, backgroundColor: 'rgba(0,120,212,0.1)' }] }, 
        options: commonOptions 
    });
    
    new Chart(document.getElementById('revChart'), { 
        type: 'bar', 
        data: { labels: years, datasets: [{ label: 'Rev', data: data.map(d=>d.Rev/1000), backgroundColor: 'rgba(220, 20, 60, 0.7)' }, { label: 'Sales', type: 'line', data: data.map(d=>d.Sales/1000), borderColor: '#fff', yAxisID: 'y1', pointRadius: 0 }] }, 
        options: { ...commonOptions, scales: { ...commonOptions.scales, y1: { position: 'right', ticks: { color: '#666', font: { size: 10 } } } } } 
    });

    require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], function(Map, SceneView, GeoJSONLayer) {
        const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";
        
        const layer = new GeoJSONLayer({ 
            url: url, 
            renderer: { 
                type: "unique-value", field: "Category", 
                defaultSymbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [0, 120, 212, 0.4] } }] }, 
                uniqueValueInfos: [{ value: "Data Center", symbol: { type: "polygon-3d", symbolLayers: [{ type: "extrude", material: { color: [255, 0, 0, 0.9] } }] } }], 
                visualVariables: [{ type: "size", field: "Daily_MWh", valueUnit: "meters" }] 
            } 
        });

        const view = new SceneView({ 
            container: "viewDiv", 
            map: new Map({ basemap: "dark-gray-vector", layers: [layer] }), 
            camera: { position: [-104.821, 38.833, 13000], tilt: 35 } 
        });
        
        // Pinned locations for all four buttons
        const points = { 
            novva: [-104.814, 39.014], 
            qts: [-104.877, 38.891], 
            taurus: [-104.878, 38.892], // Garden of the Gods / Taurus area
            t5: [-104.802, 38.796] 
        };

        window.zoomTo = (k) => view.goTo({ target: points[k], zoom: 16, tilt: 65 }, { duration: 1500 });
        
        // Fix for the 3/4 loading bug
        view.when(() => { 
            setTimeout(() => { 
                view.container.style.height = "100%"; 
                view.padding = { top: 0, bottom: 0, left: 0, right: 0 };
            }, 600); 
        });
    });
</script>
</body>
</html>
