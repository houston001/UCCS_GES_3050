<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Webpage and charts</title>
    <style>
        html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; }
        
        #locationContainer, #powerContainer {
            position: absolute; top: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 8px;
            background: rgba(25, 25, 25, 0.9); padding: 15px; border-radius: 6px;
            color: #fff; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #locationContainer { left: 20px; }
        #powerContainer { right: 20px; }

        button {
            padding: 10px 15px; cursor: pointer; border: 1px solid #444;
            border-radius: 3px; background: #333; color: #ddd;
            text-align: left; transition: 0.2s all;
        }
        button:hover { background: #444; color: #fff; }
        .active { background: #0078d4; color: #fff; border-color: #0086ed; }
        .loc-btn { background: #222; border-color: #555; }
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
</head>
<body>
    <div id="locationContainer">
        <div style="margin-bottom: 10px; font-size: 12px; font-weight: bold; color: #0078d4;">JUMP TO CENTER</div>
        <button class="loc-btn" onclick="zoomToCenter('center1')">Data Center North</button>
        <button class="loc-btn" onclick="zoomToCenter('center2')">Data Center South</button>
        <button class="loc-btn" onclick="zoomToCenter('full')">Show All</button>
    </div>

    <div id="powerContainer">
        <div style="margin-bottom: 10px; font-size: 12px; font-weight: bold; color: #0078d4;">POWER USAGE</div>
        <button id="daily" class="active">Daily (m)</button>
        <button id="weekly">Weekly (m)</button>
        <button id="monthly">Monthly (m)</button>
        <button id="yearly">Yearly (m)</button>
    </div>

    <div id="viewDiv"></div>

    <script>
        let view; 

        require([
            "esri/Map",
            "esri/views/SceneView",
            "esri/layers/GeoJSONLayer"
        ], function(Map, SceneView, GeoJSONLayer) {

            const url = "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip_FeaturesToJSON.geojson";

            function createRenderer(columnName) {
                return {
                    type: "unique-value", // Changed from "simple"
                    field: "Category",    // Looking at the Category column
                    defaultSymbol: {
                        type: "polygon-3d",
                        symbolLayers: [{
                            type: "extrude",
                            material: { color: [0, 120, 212, 0.7] }, // Default Blue
                            edges: { type: "solid", color: [255, 255, 255, 0.3], size: 0.5 }
                        }]
                    },
                    uniqueValueInfos: [{
                        value: "data center", // If Category is "data center"
                        symbol: {
                            type: "polygon-3d",
                            symbolLayers: [{
                                type: "extrude",
                                material: { color: [220, 20, 60, 0.9] }, // Bright Red
                                edges: { type: "solid", color: [255, 255, 255, 0.6], size: 1 }
                            }]
                        }
                    }],
                    visualVariables: [{
                        type: "size",
                        field: columnName,
                        valueUnit: "meters"
                    }]
                };
            }

            const layer = new GeoJSONLayer({
                url: url,
                renderer: createRenderer("Daily_MWh"),
                outFields: ["*"]
            });

            const map = new Map({
                basemap: "dark-gray-vector",
                ground: "world-elevation",
                layers: [layer]
            });

            view = new SceneView({
                container: "viewDiv",
                map: map,
                camera: {
                    position: [-104.8214, 38.8000, 4500],
                    tilt: 50
                }
            });

            const locations = {
                center1: { center: [-104.8214, 38.8339], zoom: 17, tilt: 70 },
                center2: { center: [-104.8500, 38.8100], zoom: 17, tilt: 70 }
            };

            window.zoomToCenter = function(key) {
                if (key === 'full') {
                    view.goTo(layer.fullExtent);
                } else {
                    view.goTo(locations[key]);
                }
            };

            const fieldMap = { daily: "Daily_MWh", weekly: "Weekly_MWh", monthly: "Monthly_MWh", yearly: "Yearly_MWh" };
            Object.keys(fieldMap).forEach(id => {
                document.getElementById(id).onclick = function(e) {
                    document.querySelectorAll("#powerContainer button").forEach(b => b.classList.remove("active"));
                    e.target.classList.add("active");
                    layer.renderer = createRenderer(fieldMap[id]);
                };
            });

            layer.when(() => {
                view.goTo(layer.fullExtent);
            });
        });
    </script>
</body>
</html>
