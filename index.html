<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Infrastructure Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <style>
        body { margin: 0; display: grid; grid-template-columns: 1fr 380px; height: 100vh; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        #map-container { position: relative; background: #151515; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #sidebar { padding: 20px; background: #111; border-left: 1px solid #333; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .time-controls { display: flex; gap: 5px; margin-bottom: 10px; }
        .toggle-btn { background: #333; border: none; color: #aaa; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; flex: 1; }
        .toggle-btn.active { background: #0078d4; color: white; }

        .loc-btn { background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; }
        .loc-btn:hover { border-color: #0078d4; }

        .chart-card { background: #181818; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .chart-label { font-size: 10px; color: #555; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        canvas { height: 140px !important; }
    </style>
</head>
<body>

<div id="map-container">
    <iframe src="map.html" id="mapFrame"></iframe>
</div>

<div id="sidebar">
    <h2 style="color:#0078d4; margin:0;">Analytics</h2>
    
    <div class="time-controls">
        <button onclick="updateData('Daily', this)" class="toggle-btn">Daily</button>
        <button onclick="updateData('Weekly', this)" class="toggle-btn">Weekly</button>
        <button onclick="updateData('Monthly', this)" class="toggle-btn">Monthly</button>
        <button onclick="updateData('Yearly', this)" class="toggle-btn active">Yearly</button>
    </div>

    <div style="display: flex; flex-direction: column; gap: 8px;">
        <button class="loc-btn" onclick="zoomTo('novva')"><strong>Novva</strong><br><small>2023 Launch</small></button>
        <button class="loc-btn" onclick="zoomTo('qts')"><strong>QTS</strong><br><small>2014 Launch</small></button>
    </div>

    <div class="chart-card">
        <div class="chart-label">Price Index (¢/kWh)</div>
        <canvas id="priceChart"></canvas>
    </div>

    <div class="chart-card">
        <div class="chart-label">Revenue Growth</div>
        <canvas id="revChart"></canvas>
    </div>

    <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="cityToggle" onchange="toggleBuildings(this.checked)">
        <span style="font-size: 12px;">Show All City Buildings</span>
    </div>
</div>

<script>
    const scales = {
        'Daily': [12.8, 12.9, 13.1], 'Weekly': [11.5, 13.5, 14.9],
        'Monthly': [10.2, 13.1, 14.9], 'Yearly': [7.0, 7.4, 7.3, 9.0, 11.0, 12.1, 14.3, 14.9]
    };
    const revScales = {
        'Daily': [115, 118, 125], 'Weekly': [950, 1100, 1200],
        'Monthly': [2500, 2950, 3086], 'Yearly': [687, 838, 1024, 1489, 1997, 2203, 2859, 3086]
    };
    const labels = ["1990", "1995", "2000", "2005", "2010", "2014", "2023", "2024"];

    const priceChart = new Chart(document.getElementById('priceChart'), {
        type: 'line',
        data: { labels: labels, datasets: [{ data: scales['Yearly'], borderColor: '#0078d4', backgroundColor: 'rgba(0,120,212,0.1)', fill: true }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display: false} } }
    });

    const revChart = new Chart(document.getElementById('revChart'), {
        type: 'bar',
        data: { labels: labels, datasets: [{ data: revScales['Yearly'], backgroundColor: '#dc143c' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display: false} } }
    });

    function updateData(type, btn) {
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        priceChart.data.datasets[0].data = scales[type];
        revChart.data.datasets[0].data = revScales[type];
        priceChart.update();
        revChart.update();
    }

    function zoomTo(loc) {
        const frame = document.getElementById('mapFrame').contentWindow;
        frame.postMessage({ type: 'ZOOM', target: loc }, '*');
    }

    function toggleBuildings(visible) {
        const frame = document.getElementById('mapFrame').contentWindow;
        frame.postMessage({ type: 'TOGGLE_BUILDINGS', visible: visible }, '*');
    }
</script>
</body>
</html>
