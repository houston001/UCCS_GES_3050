<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    <style>html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; background: #0b0b0b; }</style>
</head>
<body>
    <div id="viewDiv"></div>
    <script>
        require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], (Map, SceneView, GeoJSONLayer) => {
            
            const bldgLayer = new GeoJSONLayer({
                url: "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip2_FeaturesToJSON.geojson",
                outFields: ["*"],
                renderer: {
                    type: "unique-value",
                    field: "Category", 
                    defaultSymbol: {
                        type: "polygon-3d",
                        symbolLayers: [{
                            type: "extrude",
                            material: { color: [150, 150, 150, 0.2] }, // Translucent gray for all city buildings
                            size: 12
                        }]
                    },
                    uniqueValueInfos: [{
                        value: "Data Center",
                        symbol: {
                            type: "polygon-3d",
                            symbolLayers: [{
                                type: "extrude",
                                material: { color: "#dc143c" }, // Bright red for Data Centers
                                size: 45
                            }]
                        }
                    }]
                }
            });

            const view = new SceneView({
                container: "viewDiv",
                map: new Map({ basemap: "dark-gray-vector", layers: [bldgLayer] }),
                camera: { position: [-104.821, 38.833, 12000], tilt: 40 }
            });
        });
    </script>
</body>
</html>
