<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://js.arcgis.com/4.31/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.31/"></script>
    <style>
        html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; background: #0b0b0b; overflow: hidden; }
        
        #mapControls {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
            background: rgba(10, 10, 10, 0.92); padding: 18px; border-radius: 10px;
            border: 1px solid #0078d4; width: 260px;
            backdrop-filter: blur(10px);
            box-shadow: -5px 5px 20px rgba(0,0,0,0.6);
        }
        
        .control-label { font-size: 10px; color: #0078d4; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; margin-bottom: 2px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .nav-btn {
            background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 8px;
            cursor: pointer; border-radius: 4px; font-size: 11px; text-align: center;
            transition: 0.2s;
        }
        .nav-btn:hover { border-color: #0078d4; background: #222; }
        .nav-btn strong { color: #0078d4; display: block; font-size: 12px; margin-bottom: 2px; }

        .time-row { display: flex; gap: 4px; }
        .t-btn {
            background: #252525; border: 1px solid #444; color: #888; padding: 8px 4px;
            cursor: pointer; border-radius: 4px; font-size: 10px; flex: 1;
        }
        .t-btn.active { background: #0078d4; color: white; border-color: #0078d4; }
    </style>
</head>
<body>
    <div id="viewDiv"></div>

    <div id="mapControls">
        <div class="control-label">Strategic Sites</div>
        <div class="btn-grid">
            <button class="nav-btn" onclick="zoomTo('novva')"><strong>Novva</strong>North</button>
            <button class="nav-btn" onclick="zoomTo('qts')"><strong>QTS</strong>Central</button>
            <button class="nav-btn" onclick="zoomTo('t5')"><strong>T5</strong>South</button>
            <button class="nav-btn" onclick="zoomTo('raeden')"><strong>Raeden</strong>West</button>
        </div>
        
        <div class="control-label">Energy Load (MW)</div>
        <div class="time-row">
            <button class="t-btn" onclick="setDCHeight(40, this)">Daily</button>
            <button class="t-btn" onclick="setDCHeight(100, this)">Weekly</button>
            <button class="t-btn" onclick="setDCHeight(200, this)">Monthly</button>
            <button class="t-btn active" onclick="setDCHeight(450, this)">Yearly</button>
        </div>
    </div>

    <script>
        require(["esri/Map", "esri/views/SceneView", "esri/layers/GeoJSONLayer"], (Map, SceneView, GeoJSONLayer) => {
            
            function getMWRenderer(h) {
                return {
                    type: "unique-value",
                    field: "Category", 
                    defaultSymbol: {
                        type: "polygon-3d",
                        symbolLayers: [{
                            type: "extrude",
                            material: { color: [180, 180, 180, 0.6] }, // Increased opacity for visibility
                            size: 20 // Standard buildings now have a constant scale
                        }]
                    },
                    uniqueValueInfos: [{
                        value: "Data Center",
                        symbol: {
                            type: "polygon-3d",
                            symbolLayers: [{
                                type: "extrude",
                                material: { color: "#dc143c" },
                                size: h
                            }]
                        }
                    }]
                };
            }

            const bldgLayer = new GeoJSONLayer({
                url: "https://raw.githubusercontent.com/houston001/UCCS_GES_3050/main/CS_BLDG_Clip2_FeaturesToJSON.geojson",
                elevationInfo: { mode: "relative-to-ground" },
                renderer: getMWRenderer(450),
                outFields: ["*"]
            });

            const view = new SceneView({
                container: "viewDiv",
                map: new Map({ basemap: "dark-gray-vector", layers: [bldgLayer] }),
                camera: { position: [-104.821, 38.833, 15000], tilt: 40 },
                environment: {
                    lighting: { type: "virtual", directShadowsEnabled: true }
                }
            });

            const locs = {
                novva: [-104.81435, 39.01406],
                qts: [-104.8477, 38.91806],
                t5: [-104.78855, 38.78594],
                raeden: [-104.8577, 38.89405]
            };

            window.zoomTo = (s) => { view.goTo({ target: locs[s], zoom: 16, tilt: 55 }); };
            window.setDCHeight = (h, btn) => {
                document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                bldgLayer.renderer = getMWRenderer(h);
            };
        });
    </script>
</body>
</html>
